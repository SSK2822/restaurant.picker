name: Scrape Maps Lists

on:
  schedule:
    # 09:00 UTC daily (~02:00 PT / ~05:00 ET)
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit data changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh restaurant data"
          file_pattern: "public/data/*.json"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref ${{ github.ref_name }}
